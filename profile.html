<style>

.profile img{

    border-radius:50%;
    display:block;

}

.back{

    margin:30px;
}

<body>

<header>
    <h1>プロフィール</h1>
</header>

<div class="profile">

    <img src="images/icon.png" alt="プロフィール画像">

    <h2>ソビエトボール</h2>

    <p>
        栃木県を中心に活動している写真撮影愛好家です。
    </p>

    <p>
        主に鉄道写真を撮影しています。
        編成写真や記録写真を中心に活動中。
    </p>

    <p>
        使用機材：
    </p>

    <ul>
        カメラ</li>
        <li>Nikon D7100</li>
        <li>Nikon D3200</li>
        <li>Lumix FZ1000</li>
        <li style="margin-bottom:15px;">Lumix FZ85</li>
        レンズ</li>
        <li>AF 70-300mm ED</li>
        <li>AF-S DX NIKKOR 18-200mm f/3.5-5.6G ED VR II</li>
